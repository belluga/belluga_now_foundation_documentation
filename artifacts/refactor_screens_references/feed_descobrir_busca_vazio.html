<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffefec",
              "surface": "#fff3f8",
              "on-secondary-fixed": "#61095a",
              "outline-variant": "#cf9fc2",
              "on-secondary-container": "#78236f",
              "on-tertiary-fixed-variant": "#701809",
              "inverse-surface": "#20031c",
              "primary-fixed-dim": "#db65ec",
              "error-dim": "#a70138",
              "tertiary-fixed": "#ff937e",
              "on-error": "#ffefef",
              "tertiary-container": "#ff937e",
              "surface-container-low": "#ffebf6",
              "surface-container-highest": "#ffcff1",
              "secondary-container": "#ffbeee",
              "on-primary-fixed-variant": "#540062",
              "primary-dim": "#89089e",
              "primary-fixed": "#ea73fb",
              "tertiary-fixed-dim": "#fc7e66",
              "secondary": "#903984",
              "on-primary-fixed": "#010002",
              "secondary-fixed-dim": "#ffa7ec",
              "tertiary": "#9f3a27",
              "on-primary": "#ffeefb",
              "surface-variant": "#ffcff1",
              "on-background": "#45223f",
              "tertiary-dim": "#8f2e1d",
              "surface-container-high": "#ffd7f2",
              "error-container": "#f74b6d",
              "inverse-on-surface": "#bd8fb1",
              "on-primary-container": "#450051",
              "inverse-primary": "#ea73fb",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#640e02",
              "on-surface-variant": "#774f6e",
              "primary-container": "#ea73fb",
              "surface-tint": "#9720ab",
              "on-secondary-fixed-variant": "#832d79",
              "secondary-fixed": "#ffbeee",
              "surface-container": "#ffdff4",
              "secondary-dim": "#822c77",
              "surface-dim": "#ffc2ef",
              "primary": "#9720ab",
              "on-secondary": "#ffeef7",
              "on-error-container": "#510017",
              "on-surface": "#45223f",
              "surface-bright": "#fff3f8",
              "background": "#fff3f8",
              "error": "#b41340",
              "outline": "#94698a",
              "on-tertiary-fixed": "#380300"
            },
            fontFamily: {
              "headline": ["Epilogue"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-[0_24px_40px_rgba(69,34,63,0.04)] bg-gradient-to-b from-[#ffdff4]/20 to-transparent">
<div class="flex flex-col px-6 pt-4 pb-3 max-w-md mx-auto">
<div class="flex items-center justify-between mb-4">
<span class="font-headline font-black text-primary italic text-2xl tracking-tight">Bóora!</span>
<span class="material-symbols-outlined text-primary cursor-pointer active:scale-95 transition-transform" data-icon="close">close</span>
</div>
<!-- Expanded Search Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/60 text-xl" data-icon="search">search</span>
</div>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-highest border-none rounded-full text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all font-medium" placeholder="O que você procura?" type="text" value="Jazz na areia"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<button class="p-1 hover:bg-primary-container rounded-full transition-colors active:scale-90">
<span class="material-symbols-outlined text-primary text-xl" data-icon="cancel">cancel</span>
</button>
</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-40 px-8 flex flex-col items-center justify-center text-center">
<!-- Empty State Visual -->
<div class="mb-8 relative">
<div class="w-32 h-32 bg-surface-container-low rounded-full flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-primary/30 text-6xl" data-icon="search_off">search_off</span>
</div>
<!-- Decorative soft circles behind icon -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-primary-container/10 rounded-full blur-2xl"></div>
</div>
<h1 class="font-headline font-bold text-3xl text-on-surface mb-3 tracking-tight">Nada encontrado ainda</h1>
<p class="text-on-surface-variant font-body text-sm leading-relaxed max-w-[260px] mb-12">
            Não encontramos resultados para sua busca. Tente palavras mais simples ou confira nossas sugestões abaixo.
        </p>
<!-- Rapid Suggestions -->
<div class="w-full space-y-3">
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-primary font-bold mb-4">Termos em alta em Guarapari</p>
<div class="flex flex-wrap justify-center gap-2">
<button class="px-6 py-3 bg-surface-container rounded-full text-on-primary-container font-medium text-sm flex items-center gap-2 hover:bg-secondary-container transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-lg" data-icon="restaurant">restaurant</span>
                    Moqueca
                </button>
<button class="px-6 py-3 bg-surface-container rounded-full text-on-primary-container font-medium text-sm flex items-center gap-2 hover:bg-secondary-container transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-lg" data-icon="music_note">music_note</span>
                    Jazz na Praia
                </button>
<button class="px-6 py-3 bg-surface-container rounded-full text-on-primary-container font-medium text-sm flex items-center gap-2 hover:bg-secondary-container transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-lg" data-icon="beach_access">beach_access</span>
                    Praia do Morro
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl flex justify-around items-center px-4 pb-6 pt-3 rounded-t-[2.5rem] shadow-[0_-8px_24px_rgba(69,34,63,0.04)] border-t border-[#cf9fc2]/15 z-50">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-[#45223f]/50 px-6 py-2 transition-colors hover:text-[#9720ab]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Be_Vietnam_Pro'] font-medium text-[10px] uppercase tracking-widest">Home</span>
</a>
<!-- Map (Simulated Active because it's discovery/search context) -->
<a class="flex flex-col items-center justify-center bg-[#ffdff4] text-[#9720ab] rounded-full px-6 py-2 transition-all active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span class="font-['Be_Vietnam_Pro'] font-medium text-[10px] uppercase tracking-widest">Map</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#45223f]/50 px-6 py-2 transition-colors hover:text-[#9720ab]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Be_Vietnam_Pro'] font-medium text-[10px] uppercase tracking-widest">Profile</span>
</a>
</nav>
<!-- Spacer for fixed bottom nav -->
<div class="h-24"></div>
</body></html>

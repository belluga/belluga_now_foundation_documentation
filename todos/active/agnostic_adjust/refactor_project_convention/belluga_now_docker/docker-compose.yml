services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    profiles:
      - local-db
    ulimits:
      nofile:
        soft: 64000
        hard: 64000

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      bash -lc "mongosh --host mongo:27017 --quiet --eval '
      try { rs.status().ok } catch (e) { rs.initiate({_id:\"rs0\", members:[{_id:0, host:\"mongo:27017\"}]}) }
      '"
    restart: "no"
    profiles:
      - local-db

  app:
    image: ${APP_IMAGE:-laravel-app:local}
    build:
      context: .
      dockerfile: ./docker/laravel-app/Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
        required: false
    volumes:
      - ./laravel-app:/var/www
      - ./web-app:/opt/flutter-web-shell:ro
      - ./project/scripts:/var/www/project/scripts:ro
      - app-storage:/var/www/storage
    environment:
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-mongodb,stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_MONGODB_COLLECTION: ${LOG_MONGODB_COLLECTION:-application_logs}
      LOG_MONGODB_RETENTION_DAYS: ${LOG_MONGODB_RETENTION_DAYS:-14}
      FLUTTER_WEB_SHELL_PATH: /opt/flutter-web-shell/index.html
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-laravel-worker:local}
    build:
      context: .
      dockerfile: ./docker/laravel-app/Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
        required: false
      app:
        condition: service_healthy
    volumes:
      - ./laravel-app:/var/www
      - app-storage:/var/www/storage
    environment:
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-mongodb,stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_MONGODB_COLLECTION: ${LOG_MONGODB_COLLECTION:-application_logs}
      LOG_MONGODB_RETENTION_DAYS: ${LOG_MONGODB_RETENTION_DAYS:-14}
    networks:
      - app-network
    command: ["sh", "/var/www/scripts/run_queue_worker.sh"]
    restart: unless-stopped

  scheduler:
    image: ${SCHEDULER_IMAGE:-laravel-scheduler:local}
    build:
      context: .
      dockerfile: ./docker/laravel-app/Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
        required: false
      app:
        condition: service_healthy
    volumes:
      - ./laravel-app:/var/www
      - app-storage:/var/www/storage
    environment:
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-mongodb,stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_MONGODB_COLLECTION: ${LOG_MONGODB_COLLECTION:-application_logs}
      LOG_MONGODB_RETENTION_DAYS: ${LOG_MONGODB_RETENTION_DAYS:-14}
    networks:
      - app-network
    command: ["sh", "-lc", "while true; do php artisan schedule:run; sleep 60; done"]
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE:-laravel-nginx:local}
    build: ./docker/nginx
    env_file: .env
    ports:
      - "${NGINX_HOST_PORT_80}:80"
      - "${NGINX_HOST_PORT_443}:443"
    volumes:
      - ./laravel-app:/var/www
      - ./web-app:/var/www/flutter:ro
      - ./project/nginx:/etc/nginx/project:ro
      - app-storage:/var/www/storage
      - certbot-data:/etc/letsencrypt
      - certbot-challenge:/var/www/certbot
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-challenge:/var/www/certbot
    env_file: .env
    command: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot \
        --email ${CERTBOT_EMAIL} -d ${DOMAIN} --agree-tos --no-eff-email \
        --force-renewal && \
        while true; do certbot renew; sleep 12h; done"
    profiles:
      - production

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - nginx
    networks:
      - app-network
    profiles:
      - local-tunnel

networks:
  app-network:
    driver: bridge

volumes:
  certbot-data:
  certbot-challenge:
  app-storage:
  mongo-data:

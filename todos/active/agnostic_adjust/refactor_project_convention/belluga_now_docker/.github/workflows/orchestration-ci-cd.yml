name: Orchestration CI/CD

on:
  push:
    branches:
      - dev
      - stage
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - dev
      - stage
      - main
  workflow_dispatch:

concurrency:
  group: orchestration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lane_policy:
    name: Lane Promotion Policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6

      - name: Enforce branch promotion lanes
        if: github.event_name == 'pull_request'
        run: bash .github/scripts/check_promotion_lane.sh

      - name: Skip lane policy on non-PR events
        if: github.event_name != 'pull_request'
        run: |
          echo "SKIP: lane policy is only enforced for pull_request events."

  preflight:
    name: Preflight Validation
    runs-on: ubuntu-latest
    needs:
      - lane_policy
    if: ${{ github.event_name != 'pull_request' || needs.lane_policy.result == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine lane branch
        id: lane
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "branch=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve submodule checkout auth
        id: submodule_auth
        env:
          SUBMODULES_REPO_TOKEN: ${{ secrets.SUBMODULES_REPO_TOKEN }}
          WEB_APP_REPO_TOKEN: ${{ secrets.WEB_APP_REPO_TOKEN }}
        run: |
          token="${SUBMODULES_REPO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            token="${WEB_APP_REPO_TOKEN:-}"
          fi

          if [[ -n "$token" ]]; then
            echo "::add-mask::$token"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout submodules
        if: steps.submodule_auth.outputs.has_token == 'true'
        env:
          SUBMODULE_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fail when missing submodule token
        if: steps.submodule_auth.outputs.has_token != 'true'
        run: |
          echo "ERROR: missing required secret for private submodule checkout." >&2
          echo "Set SUBMODULES_REPO_TOKEN (recommended) or WEB_APP_REPO_TOKEN in this repository secrets." >&2
          exit 1

      - name: Verify environment invariants
        run: bash .github/scripts/verify_environment_ci.sh

      - name: Enforce protected submodule gitlink guardrail on dev PRs
        run: bash .github/scripts/check_submodule_gitlink_guardrail.sh

      - name: Validate submodule lane alignment
        id: submodule_lane_alignment
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_submodule_branch_alignment.sh "${{ steps.lane.outputs.branch }}"

      - name: Validate web/flutter metadata compatibility
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          WEB_APP_REPO: ${{ vars.WEB_APP_REPO }}
        run: bash .github/scripts/check_web_flutter_metadata.sh "${{ steps.lane.outputs.branch }}"

      - name: Validate promotion runtime builds
        if: ${{ (github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main')) || (github.event_name == 'push' && (github.ref_name == 'stage' || github.ref_name == 'main')) }}
        run: bash .github/scripts/preflight_promotion_runtime_builds.sh "${{ steps.lane.outputs.branch }}"

      - name: Validate pinned submodule SHA CI status (promotion PRs)
        if: ${{ github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') }}
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_submodule_sha_ci_green.sh

      - name: Prepare source promotion PRs (exact SHA, no auto-merge)
        if: ${{ always() && github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') && steps.submodule_lane_alignment.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/prepare_source_promotion_prs.sh

      - name: Validate source promotion PRs are merge-ready
        if: ${{ github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') }}
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_source_promotion_prs_ready.sh

  deploy_stage:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs:
      - preflight
    if: ${{ github.event_name == 'push' && github.ref_name == 'stage' && needs.preflight.result == 'success' }}
    environment: stage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve submodule checkout auth
        id: submodule_auth
        env:
          SUBMODULES_REPO_TOKEN: ${{ secrets.SUBMODULES_REPO_TOKEN }}
          WEB_APP_REPO_TOKEN: ${{ secrets.WEB_APP_REPO_TOKEN }}
        run: |
          token="${SUBMODULES_REPO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            token="${WEB_APP_REPO_TOKEN:-}"
          fi

          if [[ -n "$token" ]]; then
            echo "::add-mask::$token"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout submodules
        if: steps.submodule_auth.outputs.has_token == 'true'
        env:
          SUBMODULE_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fail when missing submodule token
        if: steps.submodule_auth.outputs.has_token != 'true'
        run: |
          echo "ERROR: missing required secret for private submodule checkout." >&2
          echo "Set SUBMODULES_REPO_TOKEN (recommended) or WEB_APP_REPO_TOKEN in this repository secrets." >&2
          exit 1

      - name: Resolve stage web-app runtime SHA
        id: stage_web_runtime
        env:
          DEPLOY_LANE: stage
          WEB_APP_REPO: ${{ vars.WEB_APP_REPO }}
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/resolve_web_app_runtime_sha.sh

      - name: Publish stage runtime images to GHCR
        id: stage_runtime_images
        env:
          DEPLOY_LANE: stage
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bash .github/scripts/publish_runtime_images_to_ghcr.sh

      - name: Configure SSH private key
        env:
          STAGE_SSH_PRIVATE_KEY: ${{ secrets.STAGE_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${STAGE_SSH_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: missing required secret STAGE_SSH_PRIVATE_KEY." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_stage
          chmod 600 ~/.ssh/id_ed25519_stage

      - name: Configure known hosts
        env:
          STAGE_SSH_KNOWN_HOSTS: ${{ secrets.STAGE_SSH_KNOWN_HOSTS }}
        run: |
          if [[ -z "${STAGE_SSH_KNOWN_HOSTS:-}" ]]; then
            echo "ERROR: missing required secret STAGE_SSH_KNOWN_HOSTS." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGE_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Capture stage rollback target revision
        id: stage_rollback_target
        env:
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          DEPLOY_LANE: stage
        run: bash .github/scripts/capture_successful_release_tuple_over_ssh.sh

      - name: Resolve stage navigation targets
        id: stage_nav_targets
        env:
          NAV_TENANT_URL_INPUT: ${{ vars.STAGE_NAV_TENANT_URL }}
          NAV_LANDLORD_URL_INPUT: ${{ vars.STAGE_NAV_LANDLORD_URL }}
        run: bash .github/scripts/resolve_lane_navigation_targets.sh stage

      - name: Deploy pinned stage stack over SSH
        id: stage_deploy_remote
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.STAGE_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.STAGE_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          DEPLOY_MIN_FREE_GB: ${{ vars.STAGE_DEPLOY_MIN_FREE_GB || '4' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          WEB_APP_RUNTIME_SHA: ${{ steps.stage_web_runtime.outputs.web_app_runtime_sha }}
          APP_IMAGE: ${{ steps.stage_runtime_images.outputs.app_image }}
          WORKER_IMAGE: ${{ steps.stage_runtime_images.outputs.worker_image }}
          SCHEDULER_IMAGE: ${{ steps.stage_runtime_images.outputs.scheduler_image }}
          NGINX_IMAGE: ${{ steps.stage_runtime_images.outputs.nginx_image }}
          DEPLOY_TRUSTED_TUPLE_PRESENT: ${{ steps.stage_rollback_target.outputs.trusted_tuple_present }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/scripts/deploy_stage_over_ssh.sh

      - name: Validate deployed stage web-app runtime SHA over SSH
        id: stage_runtime_web_sha_check
        if: steps.stage_deploy_remote.outcome != 'failure'
        continue-on-error: true
        env:
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          EXPECTED_WEB_APP_RUNTIME_SHA: ${{ steps.stage_web_runtime.outputs.web_app_runtime_sha }}
        run: bash .github/scripts/check_remote_web_runtime_sha_over_ssh.sh

      - name: Preflight stage initialization status
        id: stage_initialize_preflight
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: |
          set -euo pipefail

          landlord="${NAV_LANDLORD_URL%/}"
          initialize_probe_url="${landlord}/api/v1/initialize"
          landlord_host="$(python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$landlord")"
          if [[ -z "$landlord_host" ]]; then
            echo "ERROR: could not parse stage landlord host from NAV_LANDLORD_URL." >&2
            exit 1
          fi

          curl_args=()
          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            initialize_probe_url="http://${NAV_ORIGIN_IP}/api/v1/initialize"
            curl_args+=(-H "Host: ${landlord_host}")
            echo "INFO: stage initialization preflight routed directly to origin ${NAV_ORIGIN_IP} over HTTP host-header probe."
          else
            echo "INFO: stage initialization preflight using public DNS."
          fi

          echo "INFO: checking stage initialization status at ${initialize_probe_url}"
          status=""
          for attempt in $(seq 1 12); do
            status="$(curl -sS -m 15 "${curl_args[@]}" -o /tmp/stage_initialize_response.json -w '%{http_code}' "${initialize_probe_url}")"
            if [[ "${status}" == "200" || "${status}" == "403" ]]; then
              break
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              echo "WARN: stage initialize probe returned HTTP ${status} on attempt ${attempt}/12; retrying in 5s..."
              sleep 5
            fi
          done

          case "${status}" in
            200)
              echo "initialized=true" >> "$GITHUB_OUTPUT"
              ;;
            403)
              echo "initialized=false" >> "$GITHUB_OUTPUT"
              echo "::warning title=Stage not initialized::Skipping navigation smoke because /api/v1/initialize returned HTTP 403."
              cat /tmp/stage_initialize_response.json || true
              ;;
            *)
              echo "ERROR: unexpected stage initialization status ${status}. Expected 200 or 403." >&2
              cat /tmp/stage_initialize_response.json >&2 || true
              exit 1
              ;;
          esac

      - name: Block stage bootstrap without trusted successful tuple
        id: stage_untrusted_bootstrap_block
        if: steps.stage_initialize_preflight.outputs.initialized != 'true' && steps.stage_rollback_target.outputs.trusted_tuple_present == 'false'
        continue-on-error: true
        run: |
          echo "ERROR: stage initialize returned 403 before any trusted successful-release tuple existed; fail closed instead of stamping an unverified success." >&2
          exit 1

      - name: Flag unexpected stage initialize 403 on previously healthy lane
        id: stage_unexpected_initialize_403
        if: steps.stage_initialize_preflight.outputs.initialized != 'true' && steps.stage_rollback_target.outputs.trusted_tuple_present == 'true'
        continue-on-error: true
        run: |
          echo "ERROR: stage initialize returned 403 even though a trusted successful-release tuple already exists; failing closed." >&2
          exit 1

      - name: Classify stage first trusted tuple bootstrap
        id: stage_untrusted_initialized_bootstrap_block
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_rollback_target.outputs.trusted_tuple_present == 'false'
        run: |
          echo "first_trusted_tuple_bootstrap=true" >> "$GITHUB_OUTPUT"
          echo "INFO: stage initialized successfully with no trusted successful-release tuple. Continuing through the full forward proof contract before minting first trust."

      - name: Reset managed stage navigation host overrides before public-edge probe
        id: stage_public_edge_host_overrides_reset
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure'
        run: bash .github/scripts/manage_navigation_host_overrides.sh reset

      - name: Probe public stage environment endpoints
        id: stage_public_edge_environment_probe
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure'
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_PUBLIC_EDGE_MAX_ATTEMPTS: '6'
          NAV_PUBLIC_EDGE_SLEEP_SECONDS: '5'
        run: bash .github/scripts/probe_public_navigation_environment_over_https.sh stage

      - name: Setup Node.js for real navigation smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: project/tests/web_app_smoke_runner/package-lock.json

      - name: Install web navigation dependencies
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        run: npm ci
        working-directory: project/tests/web_app_smoke_runner

      - name: Install Playwright browser
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        run: npx playwright install --with-deps chromium
        working-directory: project/tests/web_app_smoke_runner

      - name: Warm up stage environment endpoints
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          NAV_WARMUP_MAX_ATTEMPTS: '12'
          NAV_WARMUP_SLEEP_SECONDS: '5'
        run: bash .github/scripts/warmup_navigation_environment_over_https.sh stage

      - name: Validate deployed stage web provenance
        id: stage_provenance_check
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        continue-on-error: true
        env:
          DEPLOY_LANE: stage
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: bash .github/scripts/check_deployed_web_provenance.sh stage

      - name: Ensure stage public taxonomy validation fixture
        id: stage_public_taxonomy_validation_fixture
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure'
        env:
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ADMIN_EMAIL: ${{ vars.STAGE_NAV_ADMIN_EMAIL }}
          NAV_ADMIN_PASSWORD: ${{ secrets.STAGE_NAV_ADMIN_PASSWORD }}
          NODE_PATH: ${{ github.workspace }}/project/tests/web_app_smoke_runner/node_modules
        working-directory: project/tests/web_app_smoke_runner
        run: node ../web_app_tests/ensure_public_taxonomy_validation_fixture.cjs

      - name: Apply managed stage navigation host overrides to origin
        id: stage_origin_host_overrides
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_public_taxonomy_validation_fixture.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: bash .github/scripts/manage_navigation_host_overrides.sh apply

      - name: Run stage real navigation smoke
        id: stage_navigation_smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_public_taxonomy_validation_fixture.outcome != 'failure'
        continue-on-error: true
        timeout-minutes: 15
        env:
          NAV_DEPLOY_LANE: stage
          NAV_WEB_TEST_TYPE: readonly
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ steps.stage_origin_host_overrides.outputs.playwright_ignore_https_errors }}
        run: bash project/tests/run_web_navigation_smoke.sh readonly

      - name: Run stage mutation navigation smoke
        id: stage_navigation_mutation_smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome != 'failure' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_public_taxonomy_validation_fixture.outcome != 'failure' && steps.stage_navigation_smoke.outcome != 'failure'
        continue-on-error: true
        timeout-minutes: 25
        env:
          NAV_DEPLOY_LANE: stage
          NAV_WEB_TEST_TYPE: mutation
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ steps.stage_origin_host_overrides.outputs.playwright_ignore_https_errors }}
          NAV_ADMIN_EMAIL: ${{ vars.STAGE_NAV_ADMIN_EMAIL }}
          NAV_ADMIN_PASSWORD: ${{ secrets.STAGE_NAV_ADMIN_PASSWORD }}
        run: bash project/tests/run_web_navigation_smoke.sh mutation

      - name: Collect stage deploy diagnostics before rollback
        if: ${{ always() && (steps.stage_deploy_remote.outcome == 'failure' || steps.stage_runtime_web_sha_check.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || steps.stage_untrusted_bootstrap_block.outcome == 'failure' || steps.stage_unexpected_initialize_403.outcome == 'failure' || steps.stage_untrusted_initialized_bootstrap_block.outcome == 'failure' || (steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_public_taxonomy_validation_fixture.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure'))) }}
        continue-on-error: true
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          OUTPUT_FILE: /tmp/stage_deploy_diagnostics.txt
        run: bash .github/scripts/collect_remote_deploy_diagnostics.sh

      - name: Upload stage navigation smoke artifacts
        if: ${{ always() && (steps.stage_deploy_remote.outcome == 'failure' || steps.stage_runtime_web_sha_check.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || steps.stage_untrusted_bootstrap_block.outcome == 'failure' || steps.stage_unexpected_initialize_403.outcome == 'failure' || steps.stage_untrusted_initialized_bootstrap_block.outcome == 'failure' || steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_public_taxonomy_validation_fixture.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure') }}
        uses: actions/upload-artifact@v7
        with:
          name: stage-navigation-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            project/tests/web_app_smoke_runner/test-results
            project/tests/web_app_smoke_runner/playwright-report
            /tmp/stage_deploy_diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Mark stage revision as successful after navigation smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_rollback_target.outputs.trusted_tuple_present == 'true' || steps.stage_untrusted_initialized_bootstrap_block.outputs.first_trusted_tuple_bootstrap == 'true') && steps.stage_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.stage_runtime_web_sha_check.outcome == 'success' && steps.stage_public_edge_environment_probe.outcome == 'success' && steps.stage_provenance_check.outcome == 'success' && steps.stage_public_taxonomy_validation_fixture.outcome == 'success' && steps.stage_navigation_smoke.outcome == 'success' && steps.stage_navigation_mutation_smoke.outcome == 'success'
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          APP_IMAGE: ${{ steps.stage_runtime_images.outputs.app_image }}
          WORKER_IMAGE: ${{ steps.stage_runtime_images.outputs.worker_image }}
          SCHEDULER_IMAGE: ${{ steps.stage_runtime_images.outputs.scheduler_image }}
          NGINX_IMAGE: ${{ steps.stage_runtime_images.outputs.nginx_image }}
        run: bash .github/scripts/mark_successful_revision_over_ssh.sh

      - name: Roll back stage deploy when provenance, preflight, smoke, or post-mutation deploy failure requires recovery
        id: stage_rollback
        if: ${{ always() && steps.stage_rollback_target.outputs.trusted_tuple_present == 'true' && ((steps.stage_deploy_remote.outcome == 'failure' && steps.stage_deploy_remote.outputs.runtime_mutated == 'true' && steps.stage_deploy_remote.outputs.internal_rollback_status != 'success') || steps.stage_runtime_web_sha_check.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || steps.stage_unexpected_initialize_403.outcome == 'failure' || (steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_public_taxonomy_validation_fixture.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure'))) }}
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.STAGE_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.STAGE_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          DEPLOY_MIN_FREE_GB: ${{ vars.STAGE_DEPLOY_MIN_FREE_GB || '4' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ROLLBACK_TARGET_REVISION: ${{ steps.stage_rollback_target.outputs.revision }}
        run: bash .github/scripts/rollback_over_ssh.sh

      - name: Determine stage rollback proof plan
        id: stage_rollback_proof_plan
        if: ${{ always() }}
        run: |
          set -euo pipefail

          run=false
          executor=""
          trusted_tuple_present="${{ steps.stage_rollback_target.outputs.trusted_tuple_present }}"
          target_revision="${{ steps.stage_rollback_target.outputs.revision }}"
          expected_web_app_runtime_sha="${{ steps.stage_rollback_target.outputs.web_app_runtime_sha }}"

          if [[ "${{ steps.stage_deploy_remote.outputs.internal_rollback_status }}" == "success" ]]; then
            run=true
            executor=internal
            if [[ -n "${{ steps.stage_deploy_remote.outputs.internal_rollback_target_revision }}" ]]; then
              target_revision="${{ steps.stage_deploy_remote.outputs.internal_rollback_target_revision }}"
            fi
            if [[ -n "${{ steps.stage_deploy_remote.outputs.internal_rollback_target_web_runtime_sha }}" ]]; then
              expected_web_app_runtime_sha="${{ steps.stage_deploy_remote.outputs.internal_rollback_target_web_runtime_sha }}"
            fi
          elif [[ "${{ steps.stage_rollback.outcome }}" == "success" ]]; then
            run=true
            executor=external
          fi

          echo "run=${run}" >> "$GITHUB_OUTPUT"
          echo "executor=${executor}" >> "$GITHUB_OUTPUT"
          echo "trusted_tuple_present=${trusted_tuple_present:-false}" >> "$GITHUB_OUTPUT"

          if [[ -n "${target_revision}" ]]; then
            echo "target_revision=${target_revision}" >> "$GITHUB_OUTPUT"
            expected_flutter_sha="$(git ls-tree "${target_revision}" flutter-app 2>/dev/null | awk '{print $3}' | tr -d '[:space:]')"
            if [[ -n "${expected_flutter_sha}" ]]; then
              echo "expected_flutter_sha=${expected_flutter_sha}" >> "$GITHUB_OUTPUT"
            fi
            if [[ -n "${expected_web_app_runtime_sha}" ]]; then
              echo "expected_web_app_runtime_sha=${expected_web_app_runtime_sha}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Guard trusted rollback target for stage rollback proof
        id: stage_rollback_proof_guard
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' }}
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ "${{ steps.stage_rollback_proof_plan.outputs.trusted_tuple_present }}" != "true" ]]; then
            echo "ERROR: stage rollback proof cannot trust the restored target because no successful-release tuple existed before live mutation." >&2
            exit 1
          fi

          if [[ -z "${{ steps.stage_rollback_proof_plan.outputs.target_revision }}" ]]; then
            echo "ERROR: stage rollback proof is missing the restored target revision." >&2
            exit 1
          fi

          if [[ -z "${{ steps.stage_rollback_proof_plan.outputs.expected_flutter_sha }}" ]]; then
            echo "ERROR: stage rollback proof could not resolve the restored flutter-app SHA from revision ${{ steps.stage_rollback_proof_plan.outputs.target_revision }}." >&2
            exit 1
          fi

          if [[ -z "${{ steps.stage_rollback_proof_plan.outputs.expected_web_app_runtime_sha }}" ]]; then
            echo "ERROR: stage rollback proof could not resolve the restored web-app runtime SHA from revision ${{ steps.stage_rollback_proof_plan.outputs.target_revision }}." >&2
            exit 1
          fi

          if [[ "${{ steps.stage_rollback_proof_plan.outputs.executor }}" == "internal" && "${{ steps.stage_rollback_target.outputs.trusted_tuple_present }}" == "true" && -n "${{ steps.stage_rollback_target.outputs.revision }}" && "${{ steps.stage_rollback_proof_plan.outputs.target_revision }}" != "${{ steps.stage_rollback_target.outputs.revision }}" ]]; then
            echo "ERROR: stage internal rollback restored revision ${{ steps.stage_rollback_proof_plan.outputs.target_revision }}, which does not match the trusted successful-release target ${{ steps.stage_rollback_target.outputs.revision }}." >&2
            exit 1
          fi

          echo "INFO: stage rollback proof will verify restored revision ${{ steps.stage_rollback_proof_plan.outputs.target_revision }} via ${{ steps.stage_rollback_proof_plan.outputs.executor }} rollback."

      - name: Validate restored stage web-app runtime SHA over SSH
        id: stage_rollback_runtime_web_sha_check
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_proof_guard.outcome != 'failure' }}
        continue-on-error: true
        env:
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          EXPECTED_WEB_APP_RUNTIME_SHA: ${{ steps.stage_rollback_proof_plan.outputs.expected_web_app_runtime_sha }}
        run: bash .github/scripts/check_remote_web_runtime_sha_over_ssh.sh

      - name: Preflight stage initialization status after rollback
        id: stage_rollback_initialize_preflight
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_proof_guard.outcome != 'failure' && steps.stage_rollback_runtime_web_sha_check.outcome != 'failure' }}
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: |
          set -euo pipefail

          landlord="${NAV_LANDLORD_URL%/}"
          initialize_probe_url="${landlord}/api/v1/initialize"
          landlord_host="$(python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$landlord")"
          if [[ -z "$landlord_host" ]]; then
            echo "ERROR: could not parse stage landlord host from NAV_LANDLORD_URL." >&2
            exit 1
          fi

          curl_args=()
          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            initialize_probe_url="http://${NAV_ORIGIN_IP}/api/v1/initialize"
            curl_args+=(-H "Host: ${landlord_host}")
            echo "INFO: stage rollback initialization proof routed directly to origin ${NAV_ORIGIN_IP} over HTTP host-header probe."
          else
            echo "INFO: stage rollback initialization proof using public DNS."
          fi

          echo "INFO: checking restored stage initialization status at ${initialize_probe_url}"
          status=""
          for attempt in $(seq 1 12); do
            status="$(curl -sS -m 15 "${curl_args[@]}" -o /tmp/stage_rollback_initialize_response.json -w '%{http_code}' "${initialize_probe_url}")"
            if [[ "${status}" == "200" ]]; then
              break
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              echo "WARN: restored stage initialize probe returned HTTP ${status} on attempt ${attempt}/12; retrying in 5s..."
              sleep 5
            fi
          done

          if [[ "${status}" != "200" ]]; then
            echo "ERROR: restored stage initialize proof expected HTTP 200 but received ${status}." >&2
            cat /tmp/stage_rollback_initialize_response.json >&2 || true
            exit 1
          fi

          echo "initialized=true" >> "$GITHUB_OUTPUT"

      - name: Reset managed stage navigation host overrides before rollback public-edge probe
        id: stage_rollback_public_edge_host_overrides_reset
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' }}
        run: bash .github/scripts/manage_navigation_host_overrides.sh reset

      - name: Probe public stage environment endpoints after rollback
        id: stage_rollback_public_edge_environment_probe
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' }}
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_PUBLIC_EDGE_MAX_ATTEMPTS: '6'
          NAV_PUBLIC_EDGE_SLEEP_SECONDS: '5'
        run: bash .github/scripts/probe_public_navigation_environment_over_https.sh stage

      - name: Setup Node.js for stage rollback proof
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: project/tests/web_app_smoke_runner/package-lock.json

      - name: Install web navigation dependencies after stage rollback
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' }}
        run: npm ci
        working-directory: project/tests/web_app_smoke_runner

      - name: Install Playwright browser after stage rollback
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' }}
        run: npx playwright install --with-deps chromium
        working-directory: project/tests/web_app_smoke_runner

      - name: Warm up stage environment endpoints after rollback
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' }}
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          NAV_WARMUP_MAX_ATTEMPTS: '12'
          NAV_WARMUP_SLEEP_SECONDS: '5'
        run: bash .github/scripts/warmup_navigation_environment_over_https.sh stage

      - name: Validate restored stage web provenance
        id: stage_rollback_provenance_check
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' }}
        continue-on-error: true
        env:
          DEPLOY_LANE: stage
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          EXPECTED_FLUTTER_SHA: ${{ steps.stage_rollback_proof_plan.outputs.expected_flutter_sha }}
        run: bash .github/scripts/check_deployed_web_provenance.sh stage

      - name: Apply managed stage rollback-proof navigation host overrides to origin
        id: stage_rollback_origin_host_overrides
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' && steps.stage_rollback_provenance_check.outcome != 'failure' }}
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: bash .github/scripts/manage_navigation_host_overrides.sh apply

      - name: Run restored stage readonly navigation smoke
        id: stage_rollback_navigation_smoke
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' && steps.stage_rollback_provenance_check.outcome != 'failure' }}
        continue-on-error: true
        timeout-minutes: 15
        env:
          NAV_DEPLOY_LANE: stage
          NAV_WEB_TEST_TYPE: readonly
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ steps.stage_rollback_origin_host_overrides.outputs.playwright_ignore_https_errors }}
        run: bash project/tests/run_web_navigation_smoke.sh readonly

      - name: Run restored stage mutation navigation smoke
        id: stage_rollback_navigation_mutation_smoke
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && steps.stage_rollback_initialize_preflight.outcome != 'failure' && steps.stage_rollback_public_edge_environment_probe.outcome != 'failure' && steps.stage_rollback_provenance_check.outcome != 'failure' && steps.stage_rollback_navigation_smoke.outcome != 'failure' }}
        continue-on-error: true
        timeout-minutes: 25
        env:
          NAV_DEPLOY_LANE: stage
          NAV_WEB_TEST_TYPE: mutation
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ steps.stage_rollback_origin_host_overrides.outputs.playwright_ignore_https_errors }}
          NAV_ADMIN_EMAIL: ${{ vars.STAGE_NAV_ADMIN_EMAIL }}
          NAV_ADMIN_PASSWORD: ${{ secrets.STAGE_NAV_ADMIN_PASSWORD }}
        run: bash project/tests/run_web_navigation_smoke.sh mutation

      - name: Collect stage rollback proof diagnostics
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && (steps.stage_rollback_proof_guard.outcome == 'failure' || steps.stage_rollback_runtime_web_sha_check.outcome == 'failure' || steps.stage_rollback_initialize_preflight.outcome == 'failure' || steps.stage_rollback_public_edge_environment_probe.outcome == 'failure' || steps.stage_rollback_provenance_check.outcome == 'failure' || steps.stage_rollback_navigation_smoke.outcome == 'failure' || steps.stage_rollback_navigation_mutation_smoke.outcome == 'failure') }}
        continue-on-error: true
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          OUTPUT_FILE: /tmp/stage_rollback_proof_diagnostics.txt
        run: bash .github/scripts/collect_remote_deploy_diagnostics.sh

      - name: Upload stage rollback proof artifacts
        if: ${{ always() && steps.stage_rollback_proof_plan.outputs.run == 'true' && (steps.stage_rollback_proof_guard.outcome == 'failure' || steps.stage_rollback_runtime_web_sha_check.outcome == 'failure' || steps.stage_rollback_initialize_preflight.outcome == 'failure' || steps.stage_rollback_public_edge_environment_probe.outcome == 'failure' || steps.stage_rollback_provenance_check.outcome == 'failure' || steps.stage_rollback_navigation_smoke.outcome == 'failure' || steps.stage_rollback_navigation_mutation_smoke.outcome == 'failure') }}
        uses: actions/upload-artifact@v7
        with:
          name: stage-rollback-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            project/tests/web_app_smoke_runner/test-results
            project/tests/web_app_smoke_runner/playwright-report
            /tmp/stage_rollback_proof_diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Fail stage deploy after rollback
        if: ${{ always() && (steps.stage_deploy_remote.outcome == 'failure' || steps.stage_runtime_web_sha_check.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || steps.stage_untrusted_bootstrap_block.outcome == 'failure' || steps.stage_unexpected_initialize_403.outcome == 'failure' || steps.stage_untrusted_initialized_bootstrap_block.outcome == 'failure' || (steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_public_taxonomy_validation_fixture.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure')) || (steps.stage_rollback_proof_plan.outputs.run == 'true' && (steps.stage_rollback_proof_guard.outcome == 'failure' || steps.stage_rollback_runtime_web_sha_check.outcome == 'failure' || steps.stage_rollback_initialize_preflight.outcome == 'failure' || steps.stage_rollback_public_edge_environment_probe.outcome == 'failure' || steps.stage_rollback_provenance_check.outcome == 'failure' || steps.stage_rollback_navigation_smoke.outcome == 'failure' || steps.stage_rollback_navigation_mutation_smoke.outcome == 'failure'))) }}
        run: |
          if [[ "${{ steps.stage_rollback_proof_guard.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback restored an untrusted or unresolved target; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_rollback_runtime_web_sha_check.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback via ${{ steps.stage_rollback_proof_plan.outputs.executor }} executor completed, but the restored web-app runtime SHA did not match the trusted target; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_untrusted_bootstrap_block.outcome }}" == "failure" ]]; then
            echo "ERROR: stage initialize returned 403 before any trusted successful-release tuple existed; bootstrap path is explicitly untrusted and cannot stamp a healthy revision." >&2
          elif [[ "${{ steps.stage_untrusted_initialized_bootstrap_block.outcome }}" == "failure" ]]; then
            echo "ERROR: stage initialized successfully before any trusted successful-release tuple existed; bootstrap path is explicitly untrusted and cannot stamp a healthy revision." >&2
          elif [[ "${{ steps.stage_runtime_web_sha_check.outcome }}" == "failure" ]]; then
            echo "ERROR: stage deploy completed, but the remote web-app runtime SHA drifted from the promoted gitlink; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_rollback_initialize_preflight.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback via ${{ steps.stage_rollback_proof_plan.outputs.executor }} executor completed, but the restored environment did not re-establish initialize=200; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_rollback_public_edge_environment_probe.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback via ${{ steps.stage_rollback_proof_plan.outputs.executor }} executor completed, but the restored public-edge environment probe failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_rollback_provenance_check.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback via ${{ steps.stage_rollback_proof_plan.outputs.executor }} executor completed, but restored provenance proof failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_rollback_navigation_mutation_smoke.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback via ${{ steps.stage_rollback_proof_plan.outputs.executor }} executor completed, but restored mutation smoke failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_rollback_navigation_smoke.outcome }}" == "failure" ]]; then
            echo "ERROR: stage rollback via ${{ steps.stage_rollback_proof_plan.outputs.executor }} executor completed, but restored readonly navigation smoke failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" && "${{ steps.stage_deploy_remote.outputs.internal_rollback_status }}" == "success" ]]; then
            echo "ERROR: stage remote deploy script failed after runtime mutation; internal rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" && "${{ steps.stage_deploy_remote.outputs.internal_rollback_status }}" == "failure" ]]; then
            echo "ERROR: stage remote deploy script failed after runtime mutation and internal rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" && "${{ steps.stage_deploy_remote.outputs.internal_rollback_status }}" == "skipped_no_previous_revision" ]]; then
            echo "ERROR: stage remote deploy script failed after runtime mutation but no previous revision existed for internal rollback; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" && "${{ steps.stage_deploy_remote.outputs.runtime_mutated }}" == "true" && "${{ steps.stage_rollback.outcome }}" == "success" ]]; then
            echo "ERROR: stage remote deploy script failed after runtime mutation; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" && "${{ steps.stage_deploy_remote.outputs.runtime_mutated }}" == "true" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage remote deploy script failed after runtime mutation and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" && "${{ steps.stage_deploy_remote.outputs.runtime_mutated }}" == "true" ]]; then
            echo "ERROR: stage remote deploy script failed after runtime mutation, but no rollback executor produced a proved healthy terminal state; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" ]]; then
            echo "ERROR: stage remote deploy script failed before runtime mutation; no rollback proof path was required." >&2
          elif [[ "${{ steps.stage_initialize_preflight.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage initialization preflight failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_unexpected_initialize_403.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage returned unexpected initialize 403 on a previously healthy lane and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_unexpected_initialize_403.outcome }}" == "failure" ]]; then
            echo "ERROR: stage returned unexpected initialize 403 on a previously healthy lane; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_initialize_preflight.outcome }}" == "failure" ]]; then
            echo "ERROR: stage initialization preflight failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_public_edge_environment_probe.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage public-edge environment probe failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_public_edge_environment_probe.outcome }}" == "failure" ]]; then
            echo "ERROR: stage public-edge environment probe failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_provenance_check.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage deployed build provenance validation failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_provenance_check.outcome }}" == "failure" ]]; then
            echo "ERROR: stage deployed build provenance validation failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_public_taxonomy_validation_fixture.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage public taxonomy validation fixture failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_public_taxonomy_validation_fixture.outcome }}" == "failure" ]]; then
            echo "ERROR: stage public taxonomy validation fixture failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_navigation_mutation_smoke.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage mutation navigation smoke failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.stage_navigation_mutation_smoke.outcome }}" == "failure" ]]; then
            echo "ERROR: stage mutation navigation smoke failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage navigation smoke failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          else
            echo "ERROR: stage navigation smoke failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          fi
          exit 1

  deploy_main:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - preflight
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.preflight.result == 'success' }}
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve submodule checkout auth
        id: submodule_auth
        env:
          SUBMODULES_REPO_TOKEN: ${{ secrets.SUBMODULES_REPO_TOKEN }}
          WEB_APP_REPO_TOKEN: ${{ secrets.WEB_APP_REPO_TOKEN }}
        run: |
          token="${SUBMODULES_REPO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            token="${WEB_APP_REPO_TOKEN:-}"
          fi

          if [[ -n "$token" ]]; then
            echo "::add-mask::$token"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout submodules
        if: steps.submodule_auth.outputs.has_token == 'true'
        env:
          SUBMODULE_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fail when missing submodule token
        if: steps.submodule_auth.outputs.has_token != 'true'
        run: |
          echo "ERROR: missing required secret for private submodule checkout." >&2
          echo "Set SUBMODULES_REPO_TOKEN (recommended) or WEB_APP_REPO_TOKEN in this repository secrets." >&2
          exit 1

      - name: Resolve production web-app runtime SHA
        id: main_web_runtime
        env:
          DEPLOY_LANE: main
          WEB_APP_REPO: ${{ vars.WEB_APP_REPO }}
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/resolve_web_app_runtime_sha.sh

      - name: Publish production runtime images to GHCR
        id: main_runtime_images
        env:
          DEPLOY_LANE: main
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bash .github/scripts/publish_runtime_images_to_ghcr.sh

      - name: Configure SSH private key
        env:
          MAIN_SSH_PRIVATE_KEY: ${{ secrets.MAIN_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${MAIN_SSH_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: missing required secret MAIN_SSH_PRIVATE_KEY." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$MAIN_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_main
          chmod 600 ~/.ssh/id_ed25519_main

      - name: Configure known hosts
        env:
          MAIN_SSH_KNOWN_HOSTS: ${{ secrets.MAIN_SSH_KNOWN_HOSTS }}
        run: |
          if [[ -z "${MAIN_SSH_KNOWN_HOSTS:-}" ]]; then
            echo "ERROR: missing required secret MAIN_SSH_KNOWN_HOSTS." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$MAIN_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Capture production rollback target revision
        id: main_rollback_target
        env:
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          DEPLOY_LANE: main
        run: bash .github/scripts/capture_successful_release_tuple_over_ssh.sh

      - name: Resolve production navigation targets
        id: main_nav_targets
        env:
          NAV_TENANT_URL_INPUT: ${{ vars.MAIN_NAV_TENANT_URL }}
          NAV_LANDLORD_URL_INPUT: ${{ vars.MAIN_NAV_LANDLORD_URL }}
        run: bash .github/scripts/resolve_lane_navigation_targets.sh main

      - name: Deploy pinned production stack over SSH
        id: main_deploy_remote
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.MAIN_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.MAIN_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.main_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          DEPLOY_MIN_FREE_GB: ${{ vars.MAIN_DEPLOY_MIN_FREE_GB || '4' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          WEB_APP_RUNTIME_SHA: ${{ steps.main_web_runtime.outputs.web_app_runtime_sha }}
          APP_IMAGE: ${{ steps.main_runtime_images.outputs.app_image }}
          WORKER_IMAGE: ${{ steps.main_runtime_images.outputs.worker_image }}
          SCHEDULER_IMAGE: ${{ steps.main_runtime_images.outputs.scheduler_image }}
          NGINX_IMAGE: ${{ steps.main_runtime_images.outputs.nginx_image }}
          DEPLOY_TRUSTED_TUPLE_PRESENT: ${{ steps.main_rollback_target.outputs.trusted_tuple_present }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/scripts/deploy_stage_over_ssh.sh

      - name: Validate deployed production web-app runtime SHA over SSH
        id: main_runtime_web_sha_check
        if: steps.main_deploy_remote.outcome != 'failure'
        continue-on-error: true
        env:
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          EXPECTED_WEB_APP_RUNTIME_SHA: ${{ steps.main_web_runtime.outputs.web_app_runtime_sha }}
        run: bash .github/scripts/check_remote_web_runtime_sha_over_ssh.sh

      - name: Preflight production initialization status
        id: main_initialize_preflight
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: |
          set -euo pipefail

          landlord="${NAV_LANDLORD_URL%/}"
          initialize_probe_url="${landlord}/api/v1/initialize"
          landlord_host="$(python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$landlord")"
          if [[ -z "$landlord_host" ]]; then
            echo "ERROR: could not parse production landlord host from NAV_LANDLORD_URL." >&2
            exit 1
          fi

          curl_args=()
          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            initialize_probe_url="http://${NAV_ORIGIN_IP}/api/v1/initialize"
            curl_args+=(-H "Host: ${landlord_host}")
            echo "INFO: production initialization preflight routed directly to origin ${NAV_ORIGIN_IP} over HTTP host-header probe."
          else
            echo "INFO: production initialization preflight using public DNS."
          fi

          echo "INFO: checking production initialization status at ${initialize_probe_url}"
          status=""
          for attempt in $(seq 1 12); do
            status="$(curl -sS -m 15 "${curl_args[@]}" -o /tmp/main_initialize_response.json -w '%{http_code}' "${initialize_probe_url}")"
            if [[ "${status}" == "200" || "${status}" == "403" ]]; then
              break
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              echo "WARN: production initialize probe returned HTTP ${status} on attempt ${attempt}/12; retrying in 5s..."
              sleep 5
            fi
          done

          case "${status}" in
            200)
              echo "initialized=true" >> "$GITHUB_OUTPUT"
              ;;
            403)
              echo "initialized=false" >> "$GITHUB_OUTPUT"
              echo "::warning title=Production not initialized::Skipping navigation smoke because /api/v1/initialize returned HTTP 403."
              cat /tmp/main_initialize_response.json || true
              ;;
            *)
              echo "ERROR: unexpected production initialization status ${status}. Expected 200 or 403." >&2
              cat /tmp/main_initialize_response.json >&2 || true
              exit 1
              ;;
          esac

      - name: Block production bootstrap without trusted successful tuple
        id: main_untrusted_bootstrap_block
        if: steps.main_initialize_preflight.outputs.initialized != 'true' && steps.main_rollback_target.outputs.trusted_tuple_present == 'false'
        continue-on-error: true
        run: |
          echo "ERROR: production initialize returned 403 before any trusted successful-release tuple existed; fail closed instead of stamping an unverified success." >&2
          exit 1

      - name: Flag unexpected production initialize 403 on previously healthy lane
        id: main_unexpected_initialize_403
        if: steps.main_initialize_preflight.outputs.initialized != 'true' && steps.main_rollback_target.outputs.trusted_tuple_present == 'true'
        continue-on-error: true
        run: |
          echo "ERROR: production initialize returned 403 even though a trusted successful-release tuple already exists; failing closed." >&2
          exit 1

      - name: Classify production first trusted tuple bootstrap
        id: main_untrusted_initialized_bootstrap_block
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_rollback_target.outputs.trusted_tuple_present == 'false'
        run: |
          echo "first_trusted_tuple_bootstrap=true" >> "$GITHUB_OUTPUT"
          echo "INFO: production initialized successfully with no trusted successful-release tuple. Continuing through the full forward proof contract before minting first trust."

      - name: Reset managed production navigation host overrides before public-edge probe
        id: main_public_edge_host_overrides_reset
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure'
        run: bash .github/scripts/manage_navigation_host_overrides.sh reset

      - name: Probe public production environment endpoints
        id: main_public_edge_environment_probe
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure'
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_PUBLIC_EDGE_MAX_ATTEMPTS: '6'
          NAV_PUBLIC_EDGE_SLEEP_SECONDS: '5'
        run: bash .github/scripts/probe_public_navigation_environment_over_https.sh main

      - name: Setup Node.js for real navigation smoke
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: project/tests/web_app_smoke_runner/package-lock.json

      - name: Install web navigation dependencies
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure'
        run: npm ci
        working-directory: project/tests/web_app_smoke_runner

      - name: Install Playwright browser
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure'
        run: npx playwright install --with-deps chromium
        working-directory: project/tests/web_app_smoke_runner

      - name: Warm up production environment endpoints
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          NAV_WARMUP_MAX_ATTEMPTS: '12'
          NAV_WARMUP_SLEEP_SECONDS: '5'
        run: bash .github/scripts/warmup_navigation_environment_over_https.sh main

      - name: Validate deployed production web provenance
        id: main_provenance_check
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure'
        continue-on-error: true
        env:
          DEPLOY_LANE: main
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: bash .github/scripts/check_deployed_web_provenance.sh main

      - name: Assert mutation suite is hard-blocked on main
        id: main_initial_mutation_guard
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure' && steps.main_provenance_check.outcome != 'failure'
        continue-on-error: true
        env:
          NAV_DEPLOY_LANE: main
          NAV_WEB_TEST_TYPE: mutation
        run: |
          guard_output="$(mktemp)"
          expected_policy_message="Hard block: web mutation suite is forbidden on main lane by policy."

          set +e
          set -o pipefail
          bash project/tests/run_web_navigation_smoke.sh mutation 2>&1 | tee "${guard_output}"
          guard_status=${PIPESTATUS[0]}
          set +o pipefail
          set -e

          if [[ "$guard_status" -eq 0 ]]; then
            echo "ERROR: mutation suite must be blocked on main lane." >&2
            exit 1
          fi

          if ! grep -Fq "${expected_policy_message}" "${guard_output}"; then
            echo "ERROR: mutation suite failed, but not with the expected main-lane policy hard block." >&2
            exit 1
          fi

          echo "Main hard block check passed (mutation is blocked)."

      - name: Apply managed production navigation host overrides to origin
        id: main_origin_host_overrides
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure' && steps.main_provenance_check.outcome != 'failure' && steps.main_initial_mutation_guard.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: bash .github/scripts/manage_navigation_host_overrides.sh apply

      - name: Run production real navigation smoke
        id: production_navigation_smoke
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome != 'failure' && steps.main_public_edge_environment_probe.outcome != 'failure' && steps.main_provenance_check.outcome != 'failure' && steps.main_initial_mutation_guard.outcome != 'failure'
        continue-on-error: true
        timeout-minutes: 15
        env:
          NAV_DEPLOY_LANE: main
          NAV_WEB_TEST_TYPE: readonly
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ steps.main_origin_host_overrides.outputs.playwright_ignore_https_errors }}
        run: bash project/tests/run_web_navigation_smoke.sh readonly

      - name: Collect production deploy diagnostics before rollback
        if: ${{ always() && (steps.main_deploy_remote.outcome == 'failure' || steps.main_runtime_web_sha_check.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || steps.main_untrusted_bootstrap_block.outcome == 'failure' || steps.main_unexpected_initialize_403.outcome == 'failure' || steps.main_untrusted_initialized_bootstrap_block.outcome == 'failure' || (steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.main_initial_mutation_guard.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure'))) }}
        continue-on-error: true
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          OUTPUT_FILE: /tmp/main_deploy_diagnostics.txt
        run: bash .github/scripts/collect_remote_deploy_diagnostics.sh

      - name: Upload production navigation smoke artifacts
        if: ${{ always() && (steps.main_deploy_remote.outcome == 'failure' || steps.main_runtime_web_sha_check.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || steps.main_untrusted_bootstrap_block.outcome == 'failure' || steps.main_unexpected_initialize_403.outcome == 'failure' || steps.main_untrusted_initialized_bootstrap_block.outcome == 'failure' || steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.main_initial_mutation_guard.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure') }}
        uses: actions/upload-artifact@v7
        with:
          name: production-navigation-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            project/tests/web_app_smoke_runner/test-results
            project/tests/web_app_smoke_runner/playwright-report
            /tmp/main_deploy_diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Mark production revision as successful after navigation smoke
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_rollback_target.outputs.trusted_tuple_present == 'true' || steps.main_untrusted_initialized_bootstrap_block.outputs.first_trusted_tuple_bootstrap == 'true') && steps.main_untrusted_initialized_bootstrap_block.outcome != 'failure' && steps.main_runtime_web_sha_check.outcome == 'success' && steps.main_public_edge_environment_probe.outcome == 'success' && steps.main_provenance_check.outcome == 'success' && steps.main_initial_mutation_guard.outcome == 'success' && steps.production_navigation_smoke.outcome == 'success'
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          APP_IMAGE: ${{ steps.main_runtime_images.outputs.app_image }}
          WORKER_IMAGE: ${{ steps.main_runtime_images.outputs.worker_image }}
          SCHEDULER_IMAGE: ${{ steps.main_runtime_images.outputs.scheduler_image }}
          NGINX_IMAGE: ${{ steps.main_runtime_images.outputs.nginx_image }}
        run: bash .github/scripts/mark_successful_revision_over_ssh.sh

      - name: Roll back production deploy when provenance, preflight, smoke, or post-mutation deploy failure requires recovery
        id: main_rollback
        if: ${{ always() && steps.main_rollback_target.outputs.trusted_tuple_present == 'true' && ((steps.main_deploy_remote.outcome == 'failure' && steps.main_deploy_remote.outputs.runtime_mutated == 'true' && steps.main_deploy_remote.outputs.internal_rollback_status != 'success') || steps.main_runtime_web_sha_check.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || steps.main_unexpected_initialize_403.outcome == 'failure' || (steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.main_initial_mutation_guard.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure'))) }}
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.MAIN_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.MAIN_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.main_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          DEPLOY_MIN_FREE_GB: ${{ vars.MAIN_DEPLOY_MIN_FREE_GB || '4' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ROLLBACK_TARGET_REVISION: ${{ steps.main_rollback_target.outputs.revision }}
        run: bash .github/scripts/rollback_over_ssh.sh

      - name: Determine production rollback proof plan
        id: main_rollback_proof_plan
        if: ${{ always() }}
        run: |
          set -euo pipefail

          run=false
          executor=""
          trusted_tuple_present="${{ steps.main_rollback_target.outputs.trusted_tuple_present }}"
          target_revision="${{ steps.main_rollback_target.outputs.revision }}"
          expected_web_app_runtime_sha="${{ steps.main_rollback_target.outputs.web_app_runtime_sha }}"

          if [[ "${{ steps.main_deploy_remote.outputs.internal_rollback_status }}" == "success" ]]; then
            run=true
            executor=internal
            if [[ -n "${{ steps.main_deploy_remote.outputs.internal_rollback_target_revision }}" ]]; then
              target_revision="${{ steps.main_deploy_remote.outputs.internal_rollback_target_revision }}"
            fi
            if [[ -n "${{ steps.main_deploy_remote.outputs.internal_rollback_target_web_runtime_sha }}" ]]; then
              expected_web_app_runtime_sha="${{ steps.main_deploy_remote.outputs.internal_rollback_target_web_runtime_sha }}"
            fi
          elif [[ "${{ steps.main_rollback.outcome }}" == "success" ]]; then
            run=true
            executor=external
          fi

          echo "run=${run}" >> "$GITHUB_OUTPUT"
          echo "executor=${executor}" >> "$GITHUB_OUTPUT"
          echo "trusted_tuple_present=${trusted_tuple_present:-false}" >> "$GITHUB_OUTPUT"

          if [[ -n "${target_revision}" ]]; then
            echo "target_revision=${target_revision}" >> "$GITHUB_OUTPUT"
            expected_flutter_sha="$(git ls-tree "${target_revision}" flutter-app 2>/dev/null | awk '{print $3}' | tr -d '[:space:]')"
            if [[ -n "${expected_flutter_sha}" ]]; then
              echo "expected_flutter_sha=${expected_flutter_sha}" >> "$GITHUB_OUTPUT"
            fi
            if [[ -n "${expected_web_app_runtime_sha}" ]]; then
              echo "expected_web_app_runtime_sha=${expected_web_app_runtime_sha}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Guard trusted rollback target for production rollback proof
        id: main_rollback_proof_guard
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' }}
        continue-on-error: true
        run: |
          set -euo pipefail

          if [[ "${{ steps.main_rollback_proof_plan.outputs.trusted_tuple_present }}" != "true" ]]; then
            echo "ERROR: production rollback proof cannot trust the restored target because no successful-release tuple existed before live mutation." >&2
            exit 1
          fi

          if [[ -z "${{ steps.main_rollback_proof_plan.outputs.target_revision }}" ]]; then
            echo "ERROR: production rollback proof is missing the restored target revision." >&2
            exit 1
          fi

          if [[ -z "${{ steps.main_rollback_proof_plan.outputs.expected_flutter_sha }}" ]]; then
            echo "ERROR: production rollback proof could not resolve the restored flutter-app SHA from revision ${{ steps.main_rollback_proof_plan.outputs.target_revision }}." >&2
            exit 1
          fi

          if [[ -z "${{ steps.main_rollback_proof_plan.outputs.expected_web_app_runtime_sha }}" ]]; then
            echo "ERROR: production rollback proof could not resolve the restored web-app runtime SHA from revision ${{ steps.main_rollback_proof_plan.outputs.target_revision }}." >&2
            exit 1
          fi

          if [[ "${{ steps.main_rollback_proof_plan.outputs.executor }}" == "internal" && "${{ steps.main_rollback_target.outputs.trusted_tuple_present }}" == "true" && -n "${{ steps.main_rollback_target.outputs.revision }}" && "${{ steps.main_rollback_proof_plan.outputs.target_revision }}" != "${{ steps.main_rollback_target.outputs.revision }}" ]]; then
            echo "ERROR: production internal rollback restored revision ${{ steps.main_rollback_proof_plan.outputs.target_revision }}, which does not match the trusted successful-release target ${{ steps.main_rollback_target.outputs.revision }}." >&2
            exit 1
          fi

          echo "INFO: production rollback proof will verify restored revision ${{ steps.main_rollback_proof_plan.outputs.target_revision }} via ${{ steps.main_rollback_proof_plan.outputs.executor }} rollback."

      - name: Validate restored production web-app runtime SHA over SSH
        id: main_rollback_runtime_web_sha_check
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_proof_guard.outcome != 'failure' }}
        continue-on-error: true
        env:
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          EXPECTED_WEB_APP_RUNTIME_SHA: ${{ steps.main_rollback_proof_plan.outputs.expected_web_app_runtime_sha }}
        run: bash .github/scripts/check_remote_web_runtime_sha_over_ssh.sh

      - name: Preflight production initialization status after rollback
        id: main_rollback_initialize_preflight
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_proof_guard.outcome != 'failure' && steps.main_rollback_runtime_web_sha_check.outcome != 'failure' }}
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: |
          set -euo pipefail

          landlord="${NAV_LANDLORD_URL%/}"
          initialize_probe_url="${landlord}/api/v1/initialize"
          landlord_host="$(python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$landlord")"
          if [[ -z "$landlord_host" ]]; then
            echo "ERROR: could not parse production landlord host from NAV_LANDLORD_URL." >&2
            exit 1
          fi

          curl_args=()
          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            initialize_probe_url="http://${NAV_ORIGIN_IP}/api/v1/initialize"
            curl_args+=(-H "Host: ${landlord_host}")
            echo "INFO: production rollback initialization proof routed directly to origin ${NAV_ORIGIN_IP} over HTTP host-header probe."
          else
            echo "INFO: production rollback initialization proof using public DNS."
          fi

          echo "INFO: checking restored production initialization status at ${initialize_probe_url}"
          status=""
          for attempt in $(seq 1 12); do
            status="$(curl -sS -m 15 "${curl_args[@]}" -o /tmp/main_rollback_initialize_response.json -w '%{http_code}' "${initialize_probe_url}")"
            if [[ "${status}" == "200" ]]; then
              break
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              echo "WARN: restored production initialize probe returned HTTP ${status} on attempt ${attempt}/12; retrying in 5s..."
              sleep 5
            fi
          done

          if [[ "${status}" != "200" ]]; then
            echo "ERROR: restored production initialize proof expected HTTP 200 but received ${status}." >&2
            cat /tmp/main_rollback_initialize_response.json >&2 || true
            exit 1
          fi

          echo "initialized=true" >> "$GITHUB_OUTPUT"

      - name: Reset managed production navigation host overrides before rollback public-edge probe
        id: main_rollback_public_edge_host_overrides_reset
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' }}
        run: bash .github/scripts/manage_navigation_host_overrides.sh reset

      - name: Probe public production environment endpoints after rollback
        id: main_rollback_public_edge_environment_probe
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' }}
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_PUBLIC_EDGE_MAX_ATTEMPTS: '6'
          NAV_PUBLIC_EDGE_SLEEP_SECONDS: '5'
        run: bash .github/scripts/probe_public_navigation_environment_over_https.sh main

      - name: Setup Node.js for production rollback proof
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: project/tests/web_app_smoke_runner/package-lock.json

      - name: Install web navigation dependencies after production rollback
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' }}
        run: npm ci
        working-directory: project/tests/web_app_smoke_runner

      - name: Install Playwright browser after production rollback
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' }}
        run: npx playwright install --with-deps chromium
        working-directory: project/tests/web_app_smoke_runner

      - name: Warm up production environment endpoints after rollback
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' }}
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          NAV_WARMUP_MAX_ATTEMPTS: '12'
          NAV_WARMUP_SLEEP_SECONDS: '5'
        run: bash .github/scripts/warmup_navigation_environment_over_https.sh main

      - name: Validate restored production web provenance
        id: main_rollback_provenance_check
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' }}
        continue-on-error: true
        env:
          DEPLOY_LANE: main
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          EXPECTED_FLUTTER_SHA: ${{ steps.main_rollback_proof_plan.outputs.expected_flutter_sha }}
        run: bash .github/scripts/check_deployed_web_provenance.sh main

      - name: Assert mutation suite is hard-blocked on production after rollback
        id: main_rollback_mutation_guard
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' && steps.main_rollback_provenance_check.outcome != 'failure' }}
        continue-on-error: true
        env:
          NAV_DEPLOY_LANE: main
          NAV_WEB_TEST_TYPE: mutation
        run: |
          guard_output="$(mktemp)"
          expected_policy_message="Hard block: web mutation suite is forbidden on main lane by policy."

          set +e
          set -o pipefail
          bash project/tests/run_web_navigation_smoke.sh mutation 2>&1 | tee "${guard_output}"
          guard_status=${PIPESTATUS[0]}
          set +o pipefail
          set -e

          if [[ "$guard_status" -eq 0 ]]; then
            echo "ERROR: mutation suite must remain blocked on main after rollback proof." >&2
            exit 1
          fi

          if ! grep -Fq "${expected_policy_message}" "${guard_output}"; then
            echo "ERROR: rollback mutation suite failed, but not with the expected main-lane policy hard block." >&2
            exit 1
          fi

          echo "Production rollback hard block check passed (mutation is blocked)."

      - name: Apply managed production rollback-proof navigation host overrides to origin
        id: main_rollback_origin_host_overrides
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' && steps.main_rollback_provenance_check.outcome != 'failure' && steps.main_rollback_mutation_guard.outcome != 'failure' }}
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: bash .github/scripts/manage_navigation_host_overrides.sh apply

      - name: Run restored production readonly navigation smoke
        id: main_rollback_navigation_smoke
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && steps.main_rollback_initialize_preflight.outcome != 'failure' && steps.main_rollback_public_edge_environment_probe.outcome != 'failure' && steps.main_rollback_provenance_check.outcome != 'failure' && steps.main_rollback_mutation_guard.outcome != 'failure' }}
        continue-on-error: true
        timeout-minutes: 15
        env:
          NAV_DEPLOY_LANE: main
          NAV_WEB_TEST_TYPE: readonly
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ steps.main_rollback_origin_host_overrides.outputs.playwright_ignore_https_errors }}
        run: bash project/tests/run_web_navigation_smoke.sh readonly

      - name: Collect production rollback proof diagnostics
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && (steps.main_rollback_proof_guard.outcome == 'failure' || steps.main_rollback_runtime_web_sha_check.outcome == 'failure' || steps.main_rollback_initialize_preflight.outcome == 'failure' || steps.main_rollback_public_edge_environment_probe.outcome == 'failure' || steps.main_rollback_provenance_check.outcome == 'failure' || steps.main_rollback_mutation_guard.outcome == 'failure' || steps.main_rollback_navigation_smoke.outcome == 'failure') }}
        continue-on-error: true
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          OUTPUT_FILE: /tmp/main_rollback_proof_diagnostics.txt
        run: bash .github/scripts/collect_remote_deploy_diagnostics.sh

      - name: Upload production rollback proof artifacts
        if: ${{ always() && steps.main_rollback_proof_plan.outputs.run == 'true' && (steps.main_rollback_proof_guard.outcome == 'failure' || steps.main_rollback_runtime_web_sha_check.outcome == 'failure' || steps.main_rollback_initialize_preflight.outcome == 'failure' || steps.main_rollback_public_edge_environment_probe.outcome == 'failure' || steps.main_rollback_provenance_check.outcome == 'failure' || steps.main_rollback_mutation_guard.outcome == 'failure' || steps.main_rollback_navigation_smoke.outcome == 'failure') }}
        uses: actions/upload-artifact@v7
        with:
          name: production-rollback-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            project/tests/web_app_smoke_runner/test-results
            project/tests/web_app_smoke_runner/playwright-report
            /tmp/main_rollback_proof_diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Fail production deploy after rollback
        if: ${{ always() && (steps.main_deploy_remote.outcome == 'failure' || steps.main_runtime_web_sha_check.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || steps.main_untrusted_bootstrap_block.outcome == 'failure' || steps.main_unexpected_initialize_403.outcome == 'failure' || steps.main_untrusted_initialized_bootstrap_block.outcome == 'failure' || (steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.main_initial_mutation_guard.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure')) || (steps.main_rollback_proof_plan.outputs.run == 'true' && (steps.main_rollback_proof_guard.outcome == 'failure' || steps.main_rollback_runtime_web_sha_check.outcome == 'failure' || steps.main_rollback_initialize_preflight.outcome == 'failure' || steps.main_rollback_public_edge_environment_probe.outcome == 'failure' || steps.main_rollback_provenance_check.outcome == 'failure' || steps.main_rollback_mutation_guard.outcome == 'failure' || steps.main_rollback_navigation_smoke.outcome == 'failure'))) }}
        run: |
          if [[ "${{ steps.main_rollback_proof_guard.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback restored an untrusted or unresolved target; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_rollback_runtime_web_sha_check.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback via ${{ steps.main_rollback_proof_plan.outputs.executor }} executor completed, but the restored web-app runtime SHA did not match the trusted target; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_untrusted_bootstrap_block.outcome }}" == "failure" ]]; then
            echo "ERROR: production initialize returned 403 before any trusted successful-release tuple existed; bootstrap path is explicitly untrusted and cannot stamp a healthy revision." >&2
          elif [[ "${{ steps.main_untrusted_initialized_bootstrap_block.outcome }}" == "failure" ]]; then
            echo "ERROR: production initialized successfully before any trusted successful-release tuple existed; bootstrap path is explicitly untrusted and cannot stamp a healthy revision." >&2
          elif [[ "${{ steps.main_runtime_web_sha_check.outcome }}" == "failure" ]]; then
            echo "ERROR: production deploy completed, but the remote web-app runtime SHA drifted from the promoted gitlink; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_rollback_initialize_preflight.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback via ${{ steps.main_rollback_proof_plan.outputs.executor }} executor completed, but the restored environment did not re-establish initialize=200; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_rollback_public_edge_environment_probe.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback via ${{ steps.main_rollback_proof_plan.outputs.executor }} executor completed, but the restored public-edge environment probe failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_rollback_provenance_check.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback via ${{ steps.main_rollback_proof_plan.outputs.executor }} executor completed, but restored provenance proof failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_rollback_mutation_guard.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback via ${{ steps.main_rollback_proof_plan.outputs.executor }} executor completed, but main mutation hard-block proof failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_rollback_navigation_smoke.outcome }}" == "failure" ]]; then
            echo "ERROR: production rollback via ${{ steps.main_rollback_proof_plan.outputs.executor }} executor completed, but restored readonly navigation smoke failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_initial_mutation_guard.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production mutation hard-block failed before success stamping and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_initial_mutation_guard.outcome }}" == "failure" ]]; then
            echo "ERROR: production mutation hard-block failed before success stamping; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" && "${{ steps.main_deploy_remote.outputs.internal_rollback_status }}" == "success" ]]; then
            echo "ERROR: production remote deploy script failed after runtime mutation; internal rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" && "${{ steps.main_deploy_remote.outputs.internal_rollback_status }}" == "failure" ]]; then
            echo "ERROR: production remote deploy script failed after runtime mutation and internal rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" && "${{ steps.main_deploy_remote.outputs.internal_rollback_status }}" == "skipped_no_previous_revision" ]]; then
            echo "ERROR: production remote deploy script failed after runtime mutation but no previous revision existed for internal rollback; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" && "${{ steps.main_deploy_remote.outputs.runtime_mutated }}" == "true" && "${{ steps.main_rollback.outcome }}" == "success" ]]; then
            echo "ERROR: production remote deploy script failed after runtime mutation; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" && "${{ steps.main_deploy_remote.outputs.runtime_mutated }}" == "true" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production remote deploy script failed after runtime mutation and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" && "${{ steps.main_deploy_remote.outputs.runtime_mutated }}" == "true" ]]; then
            echo "ERROR: production remote deploy script failed after runtime mutation, but no rollback executor produced a proved healthy terminal state; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" ]]; then
            echo "ERROR: production remote deploy script failed before runtime mutation; no rollback proof path was required." >&2
          elif [[ "${{ steps.main_initialize_preflight.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production initialization preflight failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_unexpected_initialize_403.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production returned unexpected initialize 403 on a previously healthy lane and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_unexpected_initialize_403.outcome }}" == "failure" ]]; then
            echo "ERROR: production returned unexpected initialize 403 on a previously healthy lane; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_initialize_preflight.outcome }}" == "failure" ]]; then
            echo "ERROR: production initialization preflight failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_public_edge_environment_probe.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production public-edge environment probe failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_public_edge_environment_probe.outcome }}" == "failure" ]]; then
            echo "ERROR: production public-edge environment probe failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_provenance_check.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production deployed build provenance validation failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          elif [[ "${{ steps.main_provenance_check.outcome }}" == "failure" ]]; then
            echo "ERROR: production deployed build provenance validation failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          elif [[ "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production navigation smoke failed and external rollback failed; terminal state is explicit degraded/incident." >&2
          else
            echo "ERROR: production navigation smoke failed; external rollback restored the previous healthy tuple and post-rollback proof passed." >&2
          fi
          exit 1
